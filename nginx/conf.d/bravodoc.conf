# ========================================
# proderjdoc - Server Configuration
# ========================================

# Upstream para o backend Django
upstream backend {
    server backend:8000;
}

# Upstream para o frontend Next.js
upstream frontend {
    server frontend:3000;
}

# ========================================
# HTTP Server (Redireciona para HTTPS)
# ========================================
server {
    listen 80;
    listen [::]:80;
    server_name proderjdoc.bravonix.ia.br;

    # Certbot - Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirecionar todo tráfego para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ========================================
# HTTPS Server
# ========================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name proderjdoc.bravonix.ia.br;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/proderjdoc.bravonix.ia.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/proderjdoc.bravonix.ia.br/privkey.pem;

    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Client upload size
    client_max_body_size 100M;

    # ========================================
    # Backend API (Django)
    # ========================================
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
    }

    # ========================================
    # Django Admin
    # ========================================
    location /admin/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========================================
    # Static Files (Django)
    # ========================================
    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # Media Files (Django)
    # ========================================
    location /media/ {
        alias /media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ========================================
    # Frontend (Next.js)
    # ========================================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (para Next.js HMR se necessário)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ========================================
    # Next.js Static Files
    # ========================================
    location /_next/static/ {
        proxy_pass http://frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # Health Check
    # ========================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
