# ========================================
# BravoDoc - Configuração Nginx para VM
# ========================================
#
# INSTALAÇÃO:
# 1. Copiar este arquivo para: /etc/nginx/sites-available/bravodoc
# 2. Criar symlink: sudo ln -s /etc/nginx/sites-available/bravodoc /etc/nginx/sites-enabled/
# 3. Testar: sudo nginx -t
# 4. Reload: sudo systemctl reload nginx
#
# CERTIFICADO SSL:
# sudo certbot --nginx -d bravodoc.bravonix.ia.br
#

# ========================================
# HTTP (Temporário - até instalar SSL)
# ========================================
server {
    listen 80;
    listen [::]:80;
    server_name bravodoc.bravonix.ia.br;

    # Client upload size
    client_max_body_size 100M;

    # ========================================
    # Backend API (Django) - Porta 8001
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        proxy_buffering off;
    }

    # ========================================
    # Django Admin
    # ========================================
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # ========================================
    # Static Files (Django)
    # ========================================
    location /static/ {
        alias /opt/bravodoc/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # Media Files (Django)
    # ========================================
    location /media/ {
        alias /opt/bravodoc/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ========================================
    # Frontend (Next.js) - Porta 3001
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }

    # ========================================
    # Next.js Static Files
    # ========================================
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/bravodoc.access.log;
    error_log /var/log/nginx/bravodoc.error.log;
}

# ========================================
# HTTPS (Certbot vai adicionar automaticamente)
# ========================================
# Após rodar: sudo certbot --nginx -d bravodoc.bravonix.ia.br
# O Certbot vai modificar este arquivo e adicionar a configuração HTTPS
